syntax = "proto3";

option csharp_namespace = "TarkovMonitor.Service.Contracts";
package tarkovmonitor.v1;

service TarkovMonitorService {
 rpc SubscribeToGameEvents(SubscriptionRequest) returns (stream GameEvent);
 rpc GetConfig(GetConfigRequest) returns (ServiceConfig);
 rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
 rpc GetStatus(GetStatusRequest) returns (ServiceStatus);
}

message SubscriptionRequest {
 string client_agent = 1;
}

message GetConfigRequest {}

message UpdateConfigRequest {
 string custom_logs_path                    = 1;
 string tarkov_tracker_token               = 2;  // deprecated
 string tarkov_tracker_domain              = 3;  // deprecated: use tarkov_tracker_domains map
 map<string, string> tarkov_tracker_tokens  = 4;
 string custom_map                          = 5;  // fallback map name for screenshot detection when no active raid
 map<string, string> tarkov_tracker_domains = 6;  // per-profile domain (profileId → domain)
 string screenshots_path                    = 7;  // user's EFT Screenshots folder (service can't resolve it)
}

message UpdateConfigResponse {
 bool success = 1;
 string error_message = 2;
}

message GetStatusRequest {}

message ServiceStatus {
 bool is_game_watcher_running = 1;
 bool is_log_monitor_active = 2;
 int64 uptime_seconds = 3;
}

message GameEvent {
 string event_type = 1;
 int64 timestamp_ms = 2;
 map<string, string> data = 3;
}

message ServiceConfig {
 string custom_logs_path                    = 1;
 string tarkov_tracker_token               = 2;  // deprecated
 bool   tarkov_tracker_enabled             = 3;
 string tarkov_tracker_domain              = 4;  // deprecated: use tarkov_tracker_domains map
 map<string, string> tarkov_tracker_tokens  = 5;
 string custom_map                          = 6;  // fallback map name for screenshot detection when no active raid
 map<string, string> tarkov_tracker_domains = 7;  // per-profile domain (profileId → domain)
 string screenshots_path                    = 8;  // user's EFT Screenshots folder
}

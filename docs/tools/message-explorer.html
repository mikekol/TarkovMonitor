<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TarkovMonitor — Message Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #1a1b1e;
    --surface:  #25262b;
    --border:   #373a40;
    --text:     #c1c2c5;
    --muted:    #5c5f66;
    --accent:   #4dabf7;
    --green:    #51cf66;
    --red:      #ff6b6b;
    --yellow:   #ffd43b;
    --orange:   #ff922b;

    --json-key:    #74c0fc;
    --json-str:    #a9e34b;
    --json-num:    #ffa94d;
    --json-bool:   #ff8787;
    --json-null:   #868e96;
  }

  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ─────────────────────────────────────────────── */
  header { padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; }
  header h1 span { color: var(--accent); }

  .connect-row { display: flex; align-items: center; gap: 8px; flex: 1; }
  .connect-row label { color: var(--muted); white-space: nowrap; }
  .connect-row input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 13px; width: 220px; }
  .connect-row input:focus { outline: none; border-color: var(--accent); }

  .suffix-row { display: flex; align-items: center; gap: 6px; }
  .suffix-row label { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .suffix-row select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 6px; border-radius: 4px; font-size: 12px; }

  button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; transition: opacity .15s; }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: default; }

  .btn-connect    { background: var(--green);  color: #1a1b1e; }
  .btn-disconnect { background: var(--red);    color: #fff; }
  .btn-clear      { background: var(--border); color: var(--text); }
  .btn-export     { background: var(--border); color: var(--text); }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
  .status-dot.connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.connecting   { background: var(--yellow); }
  .status-dot.disconnected { background: var(--red); }
  .status-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* ── Toolbar ─────────────────────────────────────────────── */
  .toolbar { padding: 6px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .toolbar input[type="text"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 200px; }
  .toolbar input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .toolbar label { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .toolbar select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 6px; border-radius: 4px; font-size: 12px; }

  .stats { margin-left: auto; display: flex; gap: 14px; font-size: 11px; color: var(--muted); }
  .stats span b { color: var(--text); }

  /* ── Main layout ─────────────────────────────────────────── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Message list ────────────────────────────────────────── */
  .msg-list { flex: 1; overflow-y: auto; padding: 6px 0; }

  .msg-item { display: flex; gap: 10px; padding: 5px 14px; border-bottom: 1px solid transparent; cursor: pointer; transition: background .1s; }
  .msg-item:hover { background: rgba(255,255,255,.03); }
  .msg-item.selected { background: rgba(77,171,247,.08); border-left: 2px solid var(--accent); padding-left: 12px; }
  .msg-item.highlight { border-left: 2px solid var(--orange); padding-left: 12px; }

  .msg-time { color: var(--muted); font-size: 11px; font-family: monospace; white-space: nowrap; padding-top: 1px; }
  .msg-dir  { font-size: 10px; font-weight: 700; width: 16px; text-align: center; flex-shrink: 0; }
  .msg-dir.in  { color: var(--green); }
  .msg-dir.out { color: var(--accent); }
  .msg-badge { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; background: var(--border); color: var(--text); align-self: flex-start; margin-top: 1px; }
  .msg-badge.playerPosition { background: #1c4a2e; color: var(--green); }
  .msg-badge.map            { background: #1c3a5c; color: var(--accent); }
  .msg-badge.ping           { background: #2c2c2c; color: var(--muted); }
  .msg-badge.pong           { background: #2c2c2c; color: var(--muted); }
  .msg-preview { color: var(--muted); font-size: 11px; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  /* ── Resize handle ──────────────────────────────────────── */
  .resizer { width: 5px; background: var(--border); cursor: col-resize; flex-shrink: 0; transition: background .15s; }
  .resizer:hover, .resizer.dragging { background: var(--accent); }

  /* ── Detail panel ────────────────────────────────────────── */
  .detail { width: 420px; border-left: none; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .detail-header { padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .detail-header h3 { font-size: 12px; font-weight: 600; color: var(--text); }
  .detail-actions { display: flex; gap: 6px; }
  .btn-copy { background: var(--border); color: var(--text); font-size: 11px; padding: 3px 8px; }

  .detail-body { flex: 1; overflow-y: auto; padding: 10px 12px; font-family: monospace; font-size: 12px; line-height: 1.6; }
  .detail-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--muted); font-size: 12px; font-style: italic; }

  /* JSON tree */
  .jt-node { display: block; }
  .jt-toggle { cursor: pointer; user-select: none; display: inline-flex; align-items: center; }
  .jt-toggle::before { content: '▾'; display: inline-block; width: 14px; font-size: 10px; color: var(--muted); transition: transform .12s; }
  .jt-toggle.collapsed::before { transform: rotate(-90deg); }
  .jt-children { padding-left: 18px; border-left: 1px solid var(--border); margin-left: 4px; }
  .jt-children.hidden { display: none; }
  .jt-summary { color: var(--muted); font-size: 11px; }
  .jk { color: var(--json-key); }
  .js { color: var(--json-str); }
  .jn { color: var(--json-num); }
  .jb { color: var(--json-bool); }
  .jz { color: var(--json-null); }
  .jt-brace { color: var(--muted); }
  .btn-tree-ctrl { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 10px; padding: 1px 6px; border-radius: 3px; }
  .btn-tree-ctrl:hover { color: var(--text); border-color: var(--text); opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 8px; color: var(--muted); }
  .empty-state svg { opacity: .3; }
  .empty-state p { font-size: 12px; }

  /* ── Test Sender ─────────────────────────────────────────── */
  .sender-panel { padding: 6px 14px; background: #1e2024; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
  .sender-label { font-size: 11px; font-weight: 600; color: var(--orange); white-space: nowrap; letter-spacing: .04em; }
  .sender-panel label { color: var(--muted); font-size: 11px; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .sender-panel select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 4px; font-size: 12px; }
  .sender-panel input[type="number"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 4px; font-size: 12px; width: 72px; }
  .sender-panel input[type="number"]:focus { outline: none; border-color: var(--accent); }
  .sender-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
  .btn-randomize { background: var(--border); color: var(--text); font-size: 11px; padding: 3px 8px; }
  .btn-send-pos  { background: var(--orange); color: #1a1b1e; font-size: 11px; padding: 3px 10px; font-weight: 600; }
  .sender-status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .sender-status-dot.connected { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .sender-status-dot.connecting { background: var(--yellow); }
  #senderStatusText { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<!-- Header / Connection -->
<header>
  <h1>Tarkov<span>Monitor</span> · Message Explorer</h1>
  <div class="connect-row">
    <label>Session ID</label>
    <input id="sessionId" type="text" placeholder="your-remote-id" />
    <div class="suffix-row">
      <label>Connect as</label>
      <select id="suffix">
        <option value="">browser (receive commands)</option>
        <option value="-tm">-tm (TarkovMonitor sender)</option>
        <option value="-spy">-spy (passive listener)</option>
        <option value="custom">custom…</option>
      </select>
      <input id="customSuffix" type="text" placeholder="-custom" style="display:none;width:90px;" />
    </div>
    <button class="btn-connect" id="btnConnect" onclick="connect()">Connect</button>
    <button class="btn-disconnect" id="btnDisconnect" onclick="disconnect()" disabled>Disconnect</button>
  </div>
  <div style="display:flex;align-items:center;gap:6px;">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">Disconnected</span>
  </div>
</header>

<!-- Toolbar -->
<div class="toolbar">
  <input type="text" id="filterText" placeholder="Filter messages…" oninput="renderList()" />
  <label>Type:
    <select id="filterType" onchange="renderList()">
      <option value="">all</option>
      <option value="playerPosition">playerPosition</option>
      <option value="map">map</option>
      <option value="ping">ping/pong</option>
      <option value="command">command</option>
    </select>
  </label>
  <label><input type="checkbox" id="autoScroll" checked /> Auto-scroll</label>
  <label><input type="checkbox" id="hidePing" checked onchange="renderList()" /> Hide ping/pong</label>
  <button class="btn-clear" onclick="clearMessages()">Clear</button>
  <button class="btn-export" onclick="exportMessages()">Export JSON</button>
  <div class="stats">
    <span>Total: <b id="statTotal">0</b></span>
    <span>Shown: <b id="statShown">0</b></span>
    <span>Last: <b id="statLast">—</b></span>
  </div>
</div>

<!-- Test Sender -->
<div class="sender-panel">
  <span class="sender-label">↑ SEND TEST</span>
  <div class="sender-divider"></div>
  <label>Map:
    <select id="sendMap" onchange="applyMapDefaults()">
      <option value="customs">customs</option>
      <option value="factory">factory</option>
      <option value="woods">woods</option>
      <option value="interchange">interchange</option>
      <option value="reserve">reserve</option>
      <option value="shoreline">shoreline</option>
      <option value="lighthouse">lighthouse</option>
      <option value="streets-of-tarkov">streets-of-tarkov</option>
      <option value="ground-zero">ground-zero</option>
      <option value="the-lab">the-lab</option>
    </select>
  </label>
  <button class="btn-randomize" onclick="sendNavigate()">Navigate</button>
  <div class="sender-divider"></div>
  <label>x: <input type="number" id="sendX" value="10" step="1" /></label>
  <label>y: <input type="number" id="sendY" value="3" step="1" /></label>
  <label>z: <input type="number" id="sendZ" value="225" step="1" /></label>
  <label>rot: <input type="number" id="sendRot" value="0" step="1" min="0" max="360" style="width:58px;" /></label>
  <div class="sender-divider"></div>
  <label><input type="checkbox" id="sendIncludeRadius" checked /> radius:</label>
  <input type="number" id="sendRadiusVal" value="200" min="10" max="5000" step="25" />
  <span style="font-size:11px;color:var(--muted);">m</span>
  <div class="sender-divider"></div>
  <button class="btn-randomize" onclick="randomizePosition()">Randomize</button>
  <button class="btn-send-pos" onclick="sendTestPosition()">Send</button>
  <div class="sender-divider"></div>
  <div class="sender-status-dot" id="senderDot"></div>
  <span id="senderStatusText">sender disconnected</span>
</div>

<!-- Main -->
<div class="main">
  <div class="msg-list" id="msgList" style="min-width:200px;">
    <div class="empty-state" id="emptyState">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 9h8M8 13h6M6 20l-3 1 1-3 10-10 2 2L6 20z"/>
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      </svg>
      <p>Connect to start capturing messages</p>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>
  <div class="detail" id="detailPanel">
    <div class="detail-header">
      <h3 id="detailTitle">No message selected</h3>
      <div class="detail-actions">
        <button class="btn-tree-ctrl" onclick="treeExpandAll()">Expand all</button>
        <button class="btn-tree-ctrl" onclick="treeCollapseAll()">Collapse all</button>
        <button class="btn-copy" onclick="copyDetail()">Copy</button>
      </div>
    </div>
    <div class="detail-empty" id="detailEmpty">Select a message to inspect</div>
    <div class="detail-body" id="detailBody" style="display:none"></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────
let ws = null;
let messages = [];
let selectedIdx = null;

// ── WebSocket ────────────────────────────────────────────────
function getUrl() {
  const id = document.getElementById('sessionId').value.trim();
  const suffixSel = document.getElementById('suffix').value;
  const suffix = suffixSel === 'custom'
    ? document.getElementById('customSuffix').value.trim()
    : suffixSel;
  return `wss://socket.tarkov.dev?sessionid=${id}${suffix}`;
}

function connect() {
  const id = document.getElementById('sessionId').value.trim();
  if (!id) { alert('Enter a session ID first.'); return; }

  setStatus('connecting');
  document.getElementById('btnConnect').disabled = true;

  const url = getUrl();
  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus('connected');
    document.getElementById('btnDisconnect').disabled = false;
    addMessage({ _dir: 'sys', _raw: `Connected to ${url}`, type: 'sys' });
  };

  ws.onmessage = (e) => {
    let parsed;
    try { parsed = JSON.parse(e.data); } catch { parsed = { _unparsed: e.data }; }

    // Keep-alive: respond to server pings
    if (parsed.type === 'ping') {
      ws.send(JSON.stringify({ type: 'pong' }));
    }

    parsed._dir = 'in';
    parsed._raw = e.data;
    addMessage(parsed);
  };

  ws.onerror = () => {
    addMessage({ _dir: 'sys', _raw: 'WebSocket error', type: 'error' });
  };

  ws.onclose = (e) => {
    setStatus('disconnected');
    document.getElementById('btnConnect').disabled = false;
    document.getElementById('btnDisconnect').disabled = true;
    addMessage({ _dir: 'sys', _raw: `Disconnected (code ${e.code})`, type: 'sys' });
  };
}

function disconnect() {
  if (ws) { ws.close(); ws = null; }
}

// ── Messages ─────────────────────────────────────────────────
function addMessage(msg) {
  msg._ts = new Date();
  msg._idx = messages.length;
  messages.push(msg);
  updateStats();
  renderList();

  // Auto-scroll
  if (document.getElementById('autoScroll').checked) {
    const list = document.getElementById('msgList');
    list.scrollTop = list.scrollHeight;
  }
}

function clearMessages() {
  messages = [];
  selectedIdx = null;
  renderList();
  showDetail(null);
  updateStats();
}

// ── Filtering ────────────────────────────────────────────────
function getVisible() {
  const text = document.getElementById('filterText').value.toLowerCase();
  const type = document.getElementById('filterType').value;
  const hidePing = document.getElementById('hidePing').checked;

  return messages.filter(m => {
    // Hide ping/pong
    if (hidePing && (m.type === 'ping' || m.type === 'pong')) return false;
    // Type filter
    if (type) {
      if (type === 'ping' && m.type !== 'ping' && m.type !== 'pong') return false;
      if (type !== 'ping' && type !== 'command') {
        // Match on data.type for commands
        const dataType = m?.data?.type ?? m?.type;
        if (!String(dataType ?? '').includes(type)) return false;
      }
      if (type === 'command' && m.type !== 'command') return false;
    }
    // Text filter
    if (text && !m._raw.toLowerCase().includes(text)) return false;
    return true;
  });
}

// ── Rendering ────────────────────────────────────────────────
function renderList() {
  const visible = getVisible();
  const list = document.getElementById('msgList');
  const empty = document.getElementById('emptyState');

  document.getElementById('statShown').textContent = visible.length;

  if (messages.length === 0) {
    empty.style.display = 'flex';
    // Remove all msg-items
    Array.from(list.querySelectorAll('.msg-item')).forEach(el => el.remove());
    return;
  }
  empty.style.display = 'none';

  // Rebuild list (simple approach — fine for debugging tool)
  Array.from(list.querySelectorAll('.msg-item')).forEach(el => el.remove());

  visible.forEach(m => {
    const el = document.createElement('div');
    el.className = 'msg-item' + (m._idx === selectedIdx ? ' selected' : '');

    const dataType = m?.data?.type;
    const msgType = dataType ?? m?.type ?? '?';
    if (dataType === 'playerPosition') el.classList.add('highlight');

    el.innerHTML = `
      <span class="msg-time">${fmtTime(m._ts)}</span>
      <span class="msg-dir ${m._dir === 'in' ? 'in' : m._dir === 'sys' ? '' : 'out'}">${m._dir === 'in' ? '↓' : m._dir === 'sys' ? '·' : '↑'}</span>
      <span class="msg-badge ${msgType}">${msgType}</span>
      <span class="msg-preview">${preview(m)}</span>
    `;
    el.onclick = () => selectMessage(m._idx);
    list.appendChild(el);
  });
}

function selectMessage(idx) {
  selectedIdx = idx;
  renderList();
  showDetail(messages[idx]);
}

function showDetail(m) {
  const title = document.getElementById('detailTitle');
  const empty = document.getElementById('detailEmpty');
  const body  = document.getElementById('detailBody');

  if (!m) {
    title.textContent = 'No message selected';
    empty.style.display = 'flex';
    body.style.display = 'none';
    return;
  }

  const dataType = m?.data?.type ?? m?.type ?? 'message';
  title.textContent = `${dataType} · ${fmtTime(m._ts)}`;
  empty.style.display = 'none';
  body.style.display = 'block';

  const clean = Object.fromEntries(Object.entries(m).filter(([k]) => !k.startsWith('_')));
  body.innerHTML = '';
  body.appendChild(buildTree(clean));
}

function copyDetail() {
  if (selectedIdx === null) return;
  const m = messages[selectedIdx];
  const clean = Object.fromEntries(Object.entries(m).filter(([k]) => !k.startsWith('_')));
  navigator.clipboard.writeText(JSON.stringify(clean, null, 2));
}

function exportMessages() {
  const clean = messages.map(m => Object.fromEntries(Object.entries(m).filter(([k]) => !k.startsWith('_') || k === '_ts')));
  const blob = new Blob([JSON.stringify(clean, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tarkov-messages-${Date.now()}.json`;
  a.click();
}

// ── Helpers ──────────────────────────────────────────────────
function setStatus(s) {
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('statusLabel');
  dot.className = `status-dot ${s}`;
  lbl.textContent = s.charAt(0).toUpperCase() + s.slice(1);
}

function updateStats() {
  document.getElementById('statTotal').textContent = messages.length;
  const last = messages.filter(m => m._dir !== 'sys').at(-1);
  document.getElementById('statLast').textContent = last ? fmtTime(last._ts) : '—';
}

function fmtTime(d) {
  if (!d) return '';
  return d.toLocaleTimeString('en-US', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
}

function preview(m) {
  if (m._dir === 'sys') return m._raw;
  const d = m?.data;
  if (!d) return m._raw?.slice(0, 100) ?? '';
  if (d.type === 'playerPosition') {
    const p = d.position ?? {};
    const radius = d.viewRadius !== undefined ? `  radius=${d.viewRadius}m` : '';
    return `map=${d.map}  x=${fmt(p.x)} y=${fmt(p.y)} z=${fmt(p.z)}  rot=${fmt(d.rotation)}°${radius}`;
  }
  if (d.type === 'map') return `navigate → ${d.value}`;
  return JSON.stringify(d).slice(0, 120);
}

function fmt(n) { return n !== undefined ? Number(n).toFixed(1) : '?'; }

// ── JSON tree renderer ───────────────────────────────────────
function buildTree(value, key) {
  const wrap = document.createElement('div');
  wrap.className = 'jt-node';

  const isObj   = value !== null && typeof value === 'object' && !Array.isArray(value);
  const isArr   = Array.isArray(value);
  const isLeaf  = !isObj && !isArr;

  // Key prefix (when inside an object)
  const keySpan = key !== undefined
    ? Object.assign(document.createElement('span'), { className: 'jk', textContent: `"${key}": ` })
    : null;

  if (isLeaf) {
    if (keySpan) wrap.appendChild(keySpan);
    wrap.appendChild(leafSpan(value));
    return wrap;
  }

  // Collapsible container
  const entries = isObj ? Object.entries(value) : value.map((v, i) => [i, v]);
  const open  = isObj ? '{' : '[';
  const close = isObj ? '}' : ']';
  const count = entries.length;

  const toggle = document.createElement('span');
  toggle.className = 'jt-toggle';

  if (keySpan) toggle.appendChild(keySpan);
  toggle.appendChild(Object.assign(document.createElement('span'), { className: 'jt-brace', textContent: open }));

  const summary = Object.assign(document.createElement('span'), {
    className: 'jt-summary',
    textContent: ` ${count} ${isObj ? 'key' : 'item'}${count !== 1 ? 's' : ''} `,
  });
  toggle.appendChild(summary);

  const children = document.createElement('div');
  children.className = 'jt-children';
  for (const [k, v] of entries) {
    children.appendChild(buildTree(v, isObj ? k : undefined));
  }

  const closeSpan = Object.assign(document.createElement('span'), { className: 'jt-brace', textContent: close });

  toggle.onclick = () => {
    const collapsed = toggle.classList.toggle('collapsed');
    children.classList.toggle('hidden', collapsed);
    summary.style.display = collapsed ? 'inline' : 'none';
    closeSpan.style.display = collapsed ? 'none' : 'inline';
  };
  summary.style.display = 'none'; // starts expanded

  wrap.appendChild(toggle);
  wrap.appendChild(children);
  wrap.appendChild(closeSpan);
  return wrap;
}

function leafSpan(value) {
  const s = document.createElement('span');
  if (value === null)            { s.className = 'jz'; s.textContent = 'null'; }
  else if (typeof value === 'boolean') { s.className = 'jb'; s.textContent = String(value); }
  else if (typeof value === 'number')  { s.className = 'jn'; s.textContent = String(value); }
  else                                 { s.className = 'js'; s.textContent = `"${String(value).replace(/\\/g,'\\\\').replace(/"/g,'\\"')}"`;  }
  return s;
}

function treeExpandAll() {
  const body = document.getElementById('detailBody');
  body.querySelectorAll('.jt-toggle.collapsed').forEach(t => t.click());
}

function treeCollapseAll() {
  const body = document.getElementById('detailBody');
  body.querySelectorAll('.jt-toggle:not(.collapsed)').forEach(t => t.click());
}

// ── Test Sender ──────────────────────────────────────────────
const MAP_DEFAULTS = {
  'customs':           { x: 10,   y: 3,   z: 225,  jitter: 120 },
  'factory':           { x: -2,   y: 5,   z: -18,  jitter: 40  },
  'woods':             { x: -200, y: 8,   z: 160,  jitter: 250 },
  'interchange':       { x: 120,  y: -3,  z: -7,   jitter: 150 },
  'reserve':           { x: -15,  y: -10, z: 55,   jitter: 150 },
  'shoreline':         { x: 395,  y: 5,   z: 25,   jitter: 300 },
  'lighthouse':        { x: -430, y: 2,   z: -300, jitter: 250 },
  'streets-of-tarkov': { x: -265, y: 5,   z: 218,  jitter: 200 },
  'ground-zero':       { x: 115,  y: 5,   z: -10,  jitter: 100 },
  'the-lab':           { x: 0,    y: -6,  z: 0,    jitter: 80  },
};

let senderWs = null;

function setSenderStatus(s, text) {
  const dot = document.getElementById('senderDot');
  const lbl = document.getElementById('senderStatusText');
  dot.className = 'sender-status-dot ' + s;
  lbl.textContent = text;
}

function applyMapDefaults() {
  const map = document.getElementById('sendMap').value;
  const d = MAP_DEFAULTS[map] ?? { x: 0, y: 0, z: 0, jitter: 100 };
  document.getElementById('sendX').value = d.x;
  document.getElementById('sendY').value = d.y;
  document.getElementById('sendZ').value = d.z;
}

function randomizePosition() {
  const map = document.getElementById('sendMap').value;
  const d = MAP_DEFAULTS[map] ?? { x: 0, y: 0, z: 0, jitter: 100 };
  const j = d.jitter;
  const rnd = (base, range) => Math.round((base + (Math.random() - 0.5) * 2 * range) * 10) / 10;
  document.getElementById('sendX').value = rnd(d.x, j);
  document.getElementById('sendY').value = rnd(d.y, 5);
  document.getElementById('sendZ').value = rnd(d.z, j);
  document.getElementById('sendRot').value = Math.round(Math.random() * 360);
}

function ensureSenderConnected(sessionId) {
  return new Promise((resolve, reject) => {
    if (senderWs && senderWs.readyState === WebSocket.OPEN) { resolve(); return; }
    if (senderWs) { senderWs.close(); senderWs = null; }

    const url = `wss://socket.tarkov.dev?sessionid=${sessionId}-tm`;
    setSenderStatus('connecting', 'sender connecting…');
    senderWs = new WebSocket(url);

    senderWs.onopen = () => {
      setSenderStatus('connected', 'sender ready');
      resolve();
    };
    senderWs.onerror = () => {
      setSenderStatus('', 'sender error');
      reject(new Error('Sender WebSocket error'));
    };
    senderWs.onclose = () => {
      setSenderStatus('', 'sender disconnected');
      senderWs = null;
    };
    senderWs.onmessage = (e) => {
      // Respond to pings from relay
      try {
        const p = JSON.parse(e.data);
        if (p.type === 'ping') senderWs.send(JSON.stringify({ type: 'pong' }));
      } catch {}
    };
  });
}

async function sendNavigate() {
  const sessionId = document.getElementById('sessionId').value.trim();
  if (!sessionId) { alert('Enter a Session ID in the header first.'); return; }

  const map = document.getElementById('sendMap').value;

  try { await ensureSenderConnected(sessionId); } catch (err) { alert('Could not connect sender: ' + err.message); return; }

  const payload = { type: 'command', sessionID: sessionId, data: { type: 'map', value: map } };
  senderWs.send(JSON.stringify(payload));

  const echo = JSON.parse(JSON.stringify(payload));
  echo._dir = 'out';
  echo._raw = JSON.stringify(payload);
  addMessage(echo);
}

async function sendTestPosition() {
  const sessionId = document.getElementById('sessionId').value.trim();
  if (!sessionId) { alert('Enter a Session ID in the header first.'); return; }

  const map      = document.getElementById('sendMap').value;
  const x        = parseFloat(document.getElementById('sendX').value) || 0;
  const y        = parseFloat(document.getElementById('sendY').value) || 0;
  const z        = parseFloat(document.getElementById('sendZ').value) || 0;
  const rot      = parseFloat(document.getElementById('sendRot').value) || 0;
  const withRad  = document.getElementById('sendIncludeRadius').checked;
  const radius   = parseInt(document.getElementById('sendRadiusVal').value, 10) || 200;

  try {
    await ensureSenderConnected(sessionId);
  } catch (err) {
    alert('Could not connect sender: ' + err.message);
    return;
  }

  const data = { type: 'playerPosition', map, position: { x, y, z }, rotation: rot };
  if (withRad) data.viewRadius = radius;

  const payload = { type: 'command', sessionID: sessionId, data };
  senderWs.send(JSON.stringify(payload));

  // Echo into the monitor list so we can see it
  const echo = JSON.parse(JSON.stringify(payload));
  echo._dir = 'out';
  echo._raw = JSON.stringify(payload);
  addMessage(echo);
}

});

// ── Resizable panes ──────────────────────────────────────────
(function() {
  const resizer = document.getElementById('resizer');
  const detail  = document.getElementById('detailPanel');
  const main    = document.querySelector('.main');
  let startX, startW;

  resizer.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = detail.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      const delta = startX - e.clientX;
      const newW  = Math.max(200, Math.min(startW + delta, main.getBoundingClientRect().width - 250));
      detail.style.width = newW + 'px';
    }

    function onUp() {
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();
</script>
